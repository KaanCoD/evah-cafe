<style>
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=DM+Sans:wght@400;500;600&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:#5C895C;min-height:100vh;-webkit-font-smoothing:antialiased;}
.app{max-width:460px;margin:0 auto;min-height:100vh;background:#5C895C;}
.hdr{background:#223D24;padding:13px 18px;position:sticky;top:0;z-index:50;}
.hdr-row{display:flex;align-items:center;gap:10px;}
.logo{width:44px;height:44px;object-fit:contain;flex-shrink:0;}
.logo-sm{width:34px;height:34px;object-fit:contain;flex-shrink:0;}
.bname{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:700;color:#C4962A;letter-spacing:2px;line-height:1;}
.bsub{font-size:10px;color:rgba(255,255,255,.55);letter-spacing:1.5px;text-transform:uppercase;margin-top:2px;}
.pct-n{font-family:'Cormorant Garamond',serif;font-size:25px;font-weight:700;color:#C4962A;line-height:1;margin-left:auto;text-align:right;}
.pct-s{font-size:10px;color:rgba(255,255,255,.55);text-align:right;}
.csub{font-size:11px;color:rgba(255,255,255,.55);margin-top:3px;}
.bar-w{height:3px;background:rgba(255,255,255,.12);}
.bar-f{height:100%;background:linear-gradient(90deg,#C4962A,#8BC34A);transition:width .4s;}
.sel{padding:20px 18px 120px;}
.sel-ttl{font-family:'Cormorant Garamond',serif;font-size:21px;color:#fff;font-style:italic;margin-bottom:4px;}
.sel-dt{font-size:12px;color:rgba(255,255,255,.6);margin-bottom:16px;text-transform:capitalize;}
.ni{width:100%;background:rgba(255,255,255,.13);border:1.5px solid rgba(255,255,255,.27);border-radius:12px;padding:12px 16px;font-family:'DM Sans',sans-serif;font-size:14px;color:#fff;outline:none;margin-bottom:16px;}
.ni::placeholder{color:rgba(255,255,255,.4);}
.ni:focus{border-color:#C4962A;}
.cgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px;}
.cc{background:rgba(255,255,255,.12);border-radius:14px;padding:16px 12px;text-align:center;cursor:pointer;border:2px solid transparent;transition:all .2s;}
.cc:hover,.cc:active{background:rgba(255,255,255,.2);}
.cc.on{border-color:#C4962A;background:rgba(196,150,42,.2);}
.ce{font-size:26px;display:block;margin-bottom:6px;}
.cl{font-family:'Cormorant Garamond',serif;font-size:13px;font-weight:600;color:#fff;display:block;line-height:1.2;}
.cn{font-size:10px;color:rgba(255,255,255,.5);margin-top:3px;display:block;}
.btn-s{width:100%;background:#C4962A;color:#fff;border:none;border-radius:13px;padding:15px;font-family:'DM Sans',sans-serif;font-size:15px;font-weight:700;cursor:pointer;}
.ta{padding:12px 14px 115px;}
.dia-badge{display:inline-block;background:rgba(255,255,255,.15);border-radius:20px;padding:4px 14px;font-size:12px;color:rgba(255,255,255,.8);margin-bottom:12px;text-transform:capitalize;}
.ti{display:flex;align-items:flex-start;gap:10px;padding:11px 13px;background:#fff;border-radius:12px;margin-bottom:7px;cursor:pointer;border:1.5px solid transparent;transition:all .15s;box-shadow:0 2px 5px rgba(34,61,36,.1);user-select:none;-webkit-user-select:none;}
.ti.ck{background:#EBF5EC;}
.circ{flex-shrink:0;width:22px;height:22px;border-radius:50%;border:2px solid #A5CCA5;display:flex;align-items:center;justify-content:center;margin-top:1px;transition:all .2s;}
.ti.ck .circ{background:#3D7A45;border-color:#3D7A45;}
.tick{color:#fff;font-size:12px;font-weight:700;display:none;}
.ti.ck .tick{display:block;}
.tt{font-size:13.5px;line-height:1.5;color:#1E3820;flex:1;}
.ti.ck .tt{color:#7A9B7C;text-decoration:line-through;text-decoration-color:#9AB89C;}
.empty-day{background:rgba(255,255,255,.1);border-radius:12px;padding:20px;text-align:center;color:rgba(255,255,255,.6);font-size:13px;line-height:1.6;margin-bottom:12px;}
.obs-card{background:rgba(255,255,255,.13);border-radius:14px;padding:16px;margin-top:14px;border:1.5px solid rgba(255,255,255,.2);}
.obs-ttl{font-family:'Cormorant Garamond',serif;font-size:16px;font-weight:700;color:#fff;margin-bottom:4px;}
.obs-sub{font-size:11.5px;color:rgba(255,255,255,.6);margin-bottom:10px;line-height:1.5;}
.obs-ta{width:100%;min-height:80px;background:rgba(255,255,255,.95);border:none;border-radius:10px;padding:11px 13px;font-family:'DM Sans',sans-serif;font-size:13.5px;color:#1E3820;outline:none;resize:vertical;line-height:1.6;}
.obs-foot{display:flex;align-items:center;margin-top:8px;}
.obs-ok{font-size:12px;color:rgba(255,255,255,.7);}
.obs-clr{background:rgba(255,255,255,.14);border:none;border-radius:7px;padding:5px 10px;color:rgba(255,255,255,.65);font-size:11.5px;cursor:pointer;margin-left:auto;}
.bbar{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:460px;background:#223D24;padding:10px 12px;display:flex;gap:7px;z-index:40;}
.btn-bk{background:rgba(255,255,255,.1);color:rgba(255,255,255,.8);border:none;border-radius:10px;padding:11px 13px;font-family:'DM Sans',sans-serif;font-size:12.5px;font-weight:600;cursor:pointer;white-space:nowrap;}
.btn-ed{background:rgba(255,255,255,.1);color:rgba(255,255,255,.8);border:none;border-radius:10px;padding:11px 13px;font-family:'DM Sans',sans-serif;font-size:12.5px;font-weight:600;cursor:pointer;}
.btn-rst{background:rgba(204,51,51,.25);color:#FF8A8A;border:none;border-radius:10px;padding:11px 13px;font-size:15px;cursor:pointer;}
.btn-wp{flex:1;background:#25D366;color:#fff;border:none;border-radius:10px;padding:11px;font-size:12.5px;font-weight:700;cursor:pointer;}
.ov2{display:none;position:fixed;inset:0;background:rgba(34,61,36,.55);z-index:200;align-items:center;justify-content:center;padding:20px;}
.ov2.show{display:flex;}
.box{background:#FBF7EE;border-radius:20px;padding:28px 22px;width:100%;max-width:340px;text-align:center;}
.box-ico{font-size:36px;margin-bottom:12px;}
.box-ttl{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:700;color:#223D24;margin-bottom:8px;}
.box-txt{font-size:13px;color:#6A8C6A;margin-bottom:22px;line-height:1.5;}
.box-row{display:flex;gap:10px;}
.btn-yes{flex:1;background:#CC3333;color:#fff;border:none;border-radius:12px;padding:13px;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:700;cursor:pointer;}
.btn-no{flex:1;background:#E8EFE8;color:#223D24;border:none;border-radius:12px;padding:13px;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:600;cursor:pointer;}
.ov{display:none;position:fixed;inset:0;background:rgba(34,61,36,.6);z-index:100;align-items:flex-end;justify-content:center;}
.ov.show{display:flex;}
.sh{background:#FBF7EE;border-radius:22px 22px 0 0;width:100%;max-width:460px;padding:10px 20px 40px;max-height:90vh;overflow-y:auto;}
.sh-h{width:34px;height:4px;background:#C8C0B0;border-radius:2px;margin:0 auto 16px;}
.sh-ttl{font-family:'Cormorant Garamond',serif;font-size:21px;font-weight:700;color:#223D24;margin-bottom:3px;}
.sh-sub{font-size:11.5px;color:#7A8C7A;margin-bottom:14px;line-height:1.5;}
.er{display:flex;align-items:flex-start;gap:8px;padding:10px 12px;background:#fff;border-radius:10px;margin-bottom:6px;border:1px solid #D8E8D8;flex-direction:column;}

.et{flex:1;font-size:12.5px;color:#223D24;line-height:1.4;}
.dias-row{display:flex;gap:5px;flex-wrap:wrap;margin-top:6px;}
.dp{font-size:11px;font-weight:600;padding:4px 8px;border-radius:20px;border:1.5px solid #B0CCB0;background:#fff;color:#7A8C7A;cursor:pointer;}
.dp.on{background:#3D7A45;border-color:#3D7A45;color:#fff;}
.add-box{background:#fff;border-radius:12px;padding:14px;border:1px solid #D8E8D8;margin:16px 0 14px;}
.add-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:#7A8C7A;margin-bottom:7px;}
.add-inp{width:100%;border:1.5px solid #C0D8C0;border-radius:9px;padding:9px 13px;font-family:'DM Sans',sans-serif;font-size:13px;color:#223D24;outline:none;margin-bottom:9px;}
.add-inp::placeholder{color:#B0C8B0;}
.btn-add{width:100%;background:#223D24;color:#fff;border:none;border-radius:9px;padding:10px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;cursor:pointer;}
.btn-done{width:100%;background:#3D7A45;color:#fff;border:none;border-radius:11px;padding:13px;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:700;cursor:pointer;margin-top:8px;}
.preview{background:#fff;border:1px solid #C0D8C0;border-radius:10px;padding:12px 14px;font-size:11px;line-height:1.8;color:#223D24;white-space:pre-wrap;max-height:170px;overflow-y:auto;margin-bottom:14px;font-family:monospace;}
.wp-note{font-size:11.5px;color:#3D7A45;background:#E8F4E8;border-radius:7px;padding:10px 12px;margin-bottom:13px;line-height:1.5;}
.btn-wpo{width:100%;background:#25D366;color:#fff;border:none;border-radius:10px;padding:13px;font-family:'DM Sans',sans-serif;font-size:13.5px;font-weight:700;cursor:pointer;margin-bottom:8px;}
.btn-cp{width:100%;background:#223D24;color:#fff;border:none;border-radius:10px;padding:12px;font-family:'DM Sans',sans-serif;font-size:13.5px;font-weight:600;cursor:pointer;margin-bottom:8px;}
.btn-cc{width:100%;background:transparent;border:none;color:#7A8C7A;padding:10px;font-family:'DM Sans',sans-serif;font-size:13px;cursor:pointer;}
.del-b{background:none;border:none;cursor:pointer;color:#CC4444;font-size:14px;padding:2px 4px;flex-shrink:0;}
.eye-b{background:none;border:none;cursor:pointer;font-size:15px;padding:0;flex-shrink:0;}
.hidden{opacity:.4;}

<!-- Firebase: sincroniza tarefas customizadas/ocultas/dias entre todos os celulares -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.13.2/firebase-app.js";
import { getDatabase, ref, onValue, set } from "https://www.gstatic.com/firebasejs/10.13.2/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyCWXjwmzseUxKm9tgJu-YqpYYk7RHClOqw",
  authDomain: "evah-app-bc85b.firebaseapp.com",
  databaseURL: "https://evah-app-bc85b-default-rtdb.firebaseio.com",
  projectId: "evah-app-bc85b",
  storageBucket: "evah-app-bc85b.firebasestorage.app",
  messagingSenderId: "204754713428",
  appId: "1:204754713428:web:e897951af3342995bda6c1"
};

const fbApp = initializeApp(firebaseConfig);
const db = getDatabase(fbApp);
const sharedRef = ref(db, 'shared');

// Expõe pro script clássico (não-módulo) usar
window.FB = {
  ready: false,
  push(data) {
    return set(sharedRef, { ...data, _ts: Date.now() })
      .catch(err => console.warn('Firebase push falhou (offline?):', err));
  }
};

// Listener em tempo real: quando alguém muda dados, atualiza este celular
onValue(sharedRef, (snap) => {
  const data = snap.val() || {};
  if (window.state) {
    window.state.custom = data.custom || {};
    window.state.hidden = data.hidden || {};
    window.state.dias = data.dias || {};
    // Salva cache local pra abrir offline na próxima vez
    try { localStorage.setItem("ec-custom", JSON.stringify(window.state.custom)); } catch{}
    try { localStorage.setItem("ec-hidden", JSON.stringify(window.state.hidden)); } catch{}
    try { localStorage.setItem("ec-dias", JSON.stringify(window.state.dias)); } catch{}
  }
  window.FB.ready = true;
  console.log('[Firebase] dados atualizados, re-renderizando');
  // Re-renderiza sempre que os dados mudam
  if (typeof window.render === 'function' && window.state) {
    // Detecta se o painel de edição está aberto e reabre pra atualizar a lista
    const editOpen = document.getElementById('editOv')?.classList.contains('show');
    window.render();
    if (editOpen && typeof window.openEdit === 'function') {
      window.openEdit();
    }
  }
});
</script>

  dias: {},
  custom: {},

};
window.state = state;

function load() {
  try { const n = localStorage.getItem("ec-nome"); if(n) { state.nome = n; state.nomeInp = n; } } catch{}
  try { const c = localStorage.getItem("ec-checks"); if(c) state.checks = JSON.parse(c); } catch{}
  try { const o = localStorage.getItem("ec-obs"); if(o) state.obs = JSON.parse(o); } catch{}
  try { const d = localStorage.getItem("ec-dias"); if(d) state.dias = JSON.parse(d); } catch{}
  try { const cu = localStorage.getItem("ec-custom"); if(cu) state.custom = JSON.parse(cu); } catch{}
  try { const h = localStorage.getItem("ec-hidden"); if(h) state.hidden = JSON.parse(h); } catch{}
}

function save() {
  // LOCAL (cada celular tem o seu): checks de hoje, observações, nome
  try { localStorage.setItem("ec-checks", JSON.stringify(state.checks)); } catch{}
  try { localStorage.setItem("ec-obs", JSON.stringify(state.obs)); } catch{}
  try { localStorage.setItem("ec-dias", JSON.stringify(state.dias)); } catch{}
  try { localStorage.setItem("ec-custom", JSON.stringify(state.custom)); } catch{}
  try { localStorage.setItem("ec-hidden", JSON.stringify(state.hidden)); } catch{}
  try { if(state.nome) localStorage.setItem("ec-nome", state.nome); } catch{}
}

// COMPARTILHADO (todos os celulares veem): tarefas customizadas, ocultas, dias da semana
function saveShared() {
  save(); // sempre salva local primeiro (caso esteja offline)
  if (window.FB && window.FB.push) {
    window.FB.push({
      custom: state.custom || {},
      hidden: state.hidden || {},
      dias: state.dias || {}
    });
  }
}

// Procura uma tarefa pelo ID em todos os cargos do BASE (retorna a tarefa ou null)
function findBaseTask(id) {
  for (const ck in BASE) {
    const t = BASE[ck].tarefas.find(x => x.id === id);
    if (t) return t;
  }
  return null;
}

function getTaskDias(id) {
  // 1. Override do usuário (vem do Firebase via state.dias) tem prioridade
  const d = state.dias[id];
  if (d && d.length > 0 && d.length < 7) return d;
  // 2. Se a tarefa do BASE define dias específicos (ex: "Terça"), usa isso
  const baseTask = findBaseTask(id);
  if (baseTask && baseTask.dias && baseTask.dias.length > 0 && baseTask.dias.length < 7) {
    return baseTask.dias;
  }
  // 3. Padrão: todos os dias
  return [0,1,2,3,4,5,6];
}

function isToday(id) { return getTaskDias(id).includes(TODAY_DOW); }

function getTodayTasks(ck) {
  const base = (BASE[ck]?.tarefas || []).filter(t => !state.hidden[t.id] && isToday(t.id));
  const cu = (state.custom[ck] || []).filter(t => !state.hidden[t.id] && isToday(t.id));
  return [...base, ...cu];
}

function getAllTasks(ck) {
  const base = (BASE[ck]?.tarefas || []).map(t => ({...t, builtin:true}));
  const cu = (state.custom[ck] || []).map(t => ({...t, builtin:false}));
  return [...base, ...cu];
}

function getProgress(ck) {
  const tasks = getTodayTasks(ck);
  const done = tasks.filter(t => state.checks[t.id]).length;
  return {done, total:tasks.length, pct: tasks.length ? Math.round(done/tasks.length*100) : 0};
}

function gerarMsg() {
  const ck = state.cargo;
  if(!ck) return "";
  const c = BASE[ck];
  const nm = state.nome || c.label;
  let m = "☕ *EVAH CAFÉ — Checklist*\n📅 " + HOJE_FMT.charAt(0).toUpperCase()+HOJE_FMT.slice(1) + "\n👤 *"+nm+"* | "+c.label+"\n\n";
  const tasks = getTodayTasks(ck);
  const prog = getProgress(ck);
  tasks.forEach(t => { m += (state.checks[t.id]?"✅":"❌") + " " + t.texto + "\n"; });
  m += "\n📊 *"+prog.done+"/"+prog.total+" concluídas ("+prog.pct+"%)*\n";
  const pend = tasks.filter(t => !state.checks[t.id]);
  if(pend.length) { m += "\n⚠️ *Pendências:*\n"; pend.forEach(t => { m += "• "+t.texto+"\n"; }); }
  else m += "\n✅ *Tudo concluído!*\n";
  const ocorr = (state.obs[ck]||"").trim();
  if(ocorr) m += "\n📝 *Ocorrência:*\n"+ocorr+"\n";
  m += "\n_Evah Café App_";
  return m;
}

function buildEditList(ck) {
  let html = "";
  getAllTasks(ck).forEach(t => {
    const hid = !!state.hidden[t.id];
    const curDias = getTaskDias(t.id);
    let diasHtml = '<div class="dias-row">';
    DIAS_SEMANA.forEach(d => {
      const on = curDias.includes(d.v);
      diasHtml += '<button class="dp'+(on?' on':'')+'" onclick="toggleDia(\''+t.id+'\','+d.v+')">'+d.l+'</button>';
    });
    diasHtml += '</div>';
    const delBtn = `<button class="del-b" onclick="delTask('${t.id}',${t.builtin})">✕</button>`;
    html += '<div class="er'+(hid?' hidden':'')+'" id="er_'+t.id+'">'
      +'<div class="er-top">'
      +'<button class="eye-b" onclick="toggleHidden(\''+t.id+'\')">'+(hid?'🙈':'👁️')+'</button>'
      +'<span class="et">'+escHtml(t.texto)+'</span>'
      +delBtn
      +'</div>'
      +diasHtml
      +'</div>';
  });
  return html;
}

function buildAddDias() {
  return DIAS_SEMANA.map(d =>
    '<button class="dp'+(state.addDias.includes(d.v)?' on':'')+'" onclick="toggleAddDia('+d.v+')">'+d.l+'</button>'
  ).join('');
}

function escHtml(s) {
  return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

// ACTIONS
function setCargo(k) { state.cargo = k; render(); }
function start() {
  const n = state.nomeInp.trim();
  if(n) state.nome = n;
  save();
  state.screen = "checklist";
  render();
}
function goSelect() { state.screen = "select"; render(); }
function toggleCheck(id) {
  state.checks[id] = !state.checks[id];
  save();
  render();
}
function setObs(v) {
  state.obs[state.cargo] = v;
  save();
  // just update footer without full re-render
  const foot = document.querySelector('.obs-foot');
  if(foot) {
    if(v.trim()) { foot.innerHTML = '<span class="obs-ok">✅ Registrado</span><button class="obs-clr" onclick="setObs(\'\')">Limpar</button>'; }
    else { foot.innerHTML = ''; }
  }
  // update progress
  const prog = getProgress(state.cargo);
  const pn = document.querySelector('.pct-n');
  const ps = document.querySelector('.pct-s');
  const bf = document.querySelector('.bar-f');
  if(pn) pn.textContent = prog.pct + '%';
  if(ps) ps.textContent = prog.done + '/' + prog.total;
  if(bf) bf.style.width = prog.pct + '%';
}
function resetDia() {
  const ck = state.cargo;
  getAllTasks(ck).forEach(t => { delete state.checks[t.id]; });
  state.obs[ck] = "";
  save();
  document.getElementById('cr').classList.remove('show');
  render();
}
function openEdit() { render(); document.getElementById('editOv').classList.add('show'); }
function closeEdit() { document.getElementById('editOv').classList.remove('show'); }
function toggleHidden(id) {
  state.hidden[id] = !state.hidden[id];
  saveShared();
  const el = document.getElementById('er_'+id);
  if(el) {
    el.classList.toggle('hidden', !!state.hidden[id]);
    const eyeBtn = el.querySelector('.eye-b');
    if(eyeBtn) eyeBtn.textContent = state.hidden[id] ? '🙈' : '👁️';
  }
}
function toggleDia(id, dv) {
  const cur = getTaskDias(id);
  const next = cur.includes(dv) ? cur.filter(x=>x!==dv) : [...cur, dv];
  state.dias[id] = next.length===7 ? [] : next;
  saveShared();
  // update button in edit list
  const erEl = document.getElementById('er_'+id);
  if(erEl) {
    const newDias = getTaskDias(id);
    erEl.querySelectorAll('.dp').forEach((btn,i) => {
      btn.classList.toggle('on', newDias.includes(DIAS_SEMANA[i].v));
    });
  }
}
function toggleAddDia(dv) {
  if(state.addDias.includes(dv)) state.addDias = state.addDias.filter(x=>x!==dv);
  else state.addDias = [...state.addDias, dv];
  const row = document.getElementById('addDiasRow');
  if(row) row.innerHTML = buildAddDias();
}
function addTask() {
  const inp = document.getElementById('addInp');
  const txt = inp ? inp.value.trim() : '';
  if(!txt) return;
  const id = 'cu_'+Date.now();
  const diasVal = state.addDias.length===7 ? [] : [...state.addDias];
  if(!state.custom[state.cargo]) state.custom[state.cargo] = [];
  state.custom[state.cargo].push({id, texto:txt});
  state.dias[id] = diasVal;
  state.addDias = [1,2,3,4,5,6,0];
  saveShared();
  openEdit();
}
function delTask(id, builtin) {
  if(!confirm("Excluir esta tarefa?")) return;
  const ck = state.cargo;
  if(builtin) {
    // tarefa padrão: ocultar permanentemente
    state.hidden[id] = true;
  } else {
    // tarefa customizada: remover
    state.custom[ck] = (state.custom[ck]||[]).filter(t=>t.id!==id);
    delete state.dias[id];
  }
  saveShared();
  openEdit();
}
function openWp() {
  render();
  const ov = document.getElementById('wpOv');
  const prev = document.getElementById('wpPrev');
  if(prev) prev.textContent = gerarMsg();
  ov.classList.add('show');
}
function enviarElias() {
  window.open('https://wa.me/'+ELIAS+'?text='+encodeURIComponent(gerarMsg()),'_blank');
}
function copiar() {
  const msg = gerarMsg();
  function markCopied() {
    const btn = document.getElementById('cpBtn');
    if(btn){btn.textContent='✓ Copiado!';btn.style.background='#3D7A45';setTimeout(()=>{btn.textContent='📋 Copiar Mensagem';btn.style.background='';},2500);}
  }
  const ta = document.createElement('textarea');
  ta.value = msg;
  ta.style.cssText = 'position:fixed;top:0;left:0;width:1px;height:1px;opacity:0;';
  document.body.appendChild(ta);
  ta.focus();
  ta.select();
  ta.setSelectionRange(0, 99999);
  try { document.execCommand('copy'); markCopied(); } catch(e) {}
  document.body.removeChild(ta);
  if(navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(msg).then(markCopied).catch(()=>{});
  }
}

// INIT
window.render = render;
window.openEdit = openEdit;
load();
render();
</script>
<script>
// Service Worker pra funcionar offline
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('service-worker.js')
      .then(reg => console.log('SW registrado:', reg.scope))
      .catch(err => console.warn('SW falhou:', err));
  });
}
</script>
